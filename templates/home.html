<html>
<body>
    <div class="login">
    <h1>Student Placement Prediction System</h1>
    <p>*Prediction is based on academic performance and test scores</p>
       <form action="{{ url_for('predict_datapoint')}}" method="post">
        
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="M">
                    M
                </option>
                <option value="F">
                    F
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Secondary Education Percentage (ssc_p)</label>
            <input class="form-control" type="number" step="0.01" name="ssc_p"
                placeholder="Enter SSC percentage" min='0' max='100' required />
        </div>
        <div class="mb-3">
            <label class="form-label">SSC Board (ssc_b)</label>
            <select class="form-control" name="ssc_b" required>
                <option class="placeholder" selected disabled value="">Select SSC board</option>
                <option value="Central">Central</option>
                <option value="Others">Others</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Higher Secondary Percentage (hsc_p)</label>
            <input class="form-control" type="number" step="0.01" name="hsc_p"
                placeholder="Enter HSC percentage" min='0' max='100' required />
        </div>
        <div class="mb-3">
            <label class="form-label">HSC Board (hsc_b)</label>
            <select class="form-control" name="hsc_b" required>
                <option class="placeholder" selected disabled value="">Select HSC board</option>
                <option value="Central">Central</option>
                <option value="Others">Others</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">HSC Stream (hsc_s)</label>
            <select class="form-control" name="hsc_s" required>
                <option class="placeholder" selected disabled value="">Select HSC stream</option>
                <option value="Commerce">Commerce</option>
                <option value="Science">Science</option>
                <option value="Arts">Arts</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Degree Percentage (degree_p)</label>
            <input class="form-control" type="number" step="0.01" name="degree_p"
                placeholder="Enter degree percentage" min='0' max='100' required />
        </div>
        <div class="mb-3">
            <label class="form-label">Degree Type (degree_t)</label>
            <select class="form-control" name="degree_t" required>
                <option class="placeholder" selected disabled value="">Select degree type</option>
                <option value="Sci&Tech">Sci&Tech</option>
                <option value="Comm&Mgmt">Comm&Mgmt</option>
                <option value="Others">Others</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Work Experience (workex)</label>
            <select class="form-control" name="workex" required>
                <option class="placeholder" selected disabled value="">Select work experience</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Employability Test Percentage (etest_p)</label>
            <input class="form-control" type="number" step="0.01" name="etest_p"
                placeholder="Enter employability test percentage" min='0' max='100' required />
        </div>
        <div class="mb-3">
            <label class="form-label">MBA Specialisation (specialisation)</label>
            <select class="form-control" name="specialisation" required>
                <option class="placeholder" selected disabled value="">Select specialisation</option>
                <option value="Mkt&HR">Mkt&HR</option>
                <option value="Mkt&Fin">Mkt&Fin</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">MBA Percentage (mba_p)</label>
            <input class="form-control" type="number" step="0.01" name="mba_p"
                placeholder="Enter MBA percentage" min='0' max='100' required />
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict Placement Status" required />
        </div>
    </form>
    <h2>
       Predicted placement status: {{results}}
    </h2>
   <body>
</html>
