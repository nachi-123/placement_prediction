<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Prediction</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .main-container {
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-header-custom {
            background-color: #007bff;
            color: white;
            border-top-left-radius: 15px !important;
            border-top-right-radius: 15px !important;
            text-align: center;
            padding: 20px;
        }
        .form-label {
            font-weight: 500;
        }
        .prediction-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card card-custom">
                    <div class="card-header card-header-custom">
                        <h2>Student Placement Prediction System</h2>
                        <p class="mb-0">Enter your academic details to predict placement status</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="{{ url_for('predict_datapoint')}}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select" name="gender" required>
                                        <option selected disabled value="">Select Gender</option>
                                        <option value="M">Male (M)</option>
                                        <option value="F">Female (F)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Secondary Ed % (ssc_p)</label>
                                    <input class="form-control" type="number" step="0.01" name="ssc_p" placeholder="Enter SSC %" min='0' max='100' required />
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">SSC Board</label>
                                    <select class="form-select" name="ssc_b" required>
                                        <option selected disabled value="">Select SSC Board</option>
                                        <option value="Central">Central</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Higher Secondary % (hsc_p)</label>
                                    <input class="form-control" type="number" step="0.01" name="hsc_p" placeholder="Enter HSC %" min='0' max='100' required />
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">HSC Board</label>
                                    <select class="form-select" name="hsc_b" required>
                                        <option selected disabled value="">Select HSC Board</option>
                                        <option value="Central">Central</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">HSC Stream</label>
                                    <select class="form-select" name="hsc_s" required>
                                        <option selected disabled value="">Select HSC Stream</option>
                                        <option value="Commerce">Commerce</option>
                                        <option value="Science">Science</option>
                                        <option value="Arts">Arts</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Degree Percentage (degree_p)</label>
                                    <input class="form-control" type="number" step="0.01" name="degree_p" placeholder="Enter Degree %" min='0' max='100' required />
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Degree Type</label>
                                    <select class="form-select" name="degree_t" required>
                                        <option selected disabled value="">Select Degree Type</option>
                                        <option value="Sci&Tech">Sci&Tech</option>
                                        <option value="Comm&Mgmt">Comm&Mgmt</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Work Experience</label>
                                    <select class="form-select" name="workex" required>
                                        <option selected disabled value="">Select Work Experience</option>
                                        <option value="Yes">Yes</option>
                                        <option value="No">No</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Employability Test %</label>
                                    <input class="form-control" type="number" step="0.01" name="etest_p" placeholder="Enter E-Test %" min='0' max='100' required />
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">MBA Specialisation</label>
                                    <select class="form-select" name="specialisation" required>
                                        <option selected disabled value="">Select Specialisation</option>
                                        <option value="Mkt&HR">Mkt&HR</option>
                                        <option value="Mkt&Fin">Mkt&Fin</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">MBA Percentage (mba_p)</label>
                                    <input class="form-control" type="number" step="0.01" name="mba_p" placeholder="Enter MBA %" min='0' max='100' required />
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-primary btn-lg" type="submit">Predict Placement Status</button>
                            </div>
                        </form>

                        {% if results %}
                            <div class="prediction-result {% if results == 'Placed' %}bg-success text-white{% else %}bg-danger text-white{% endif %}">
                                Predicted placement status: {{results}}
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
    </h2>
   <body>
</html>
